# SkySaver FastAPI Reverse Proxy
# Location: /etc/nginx/sites-available/skysaver
# Symlink:  /etc/nginx/sites-enabled/skysaver -> /etc/nginx/sites-available/skysaver
#
# PREREQUISITE: Add the rate-limit zone to /etc/nginx/nginx.conf inside the
# http {} block BEFORE enabling this site:
#
#   limit_req_zone $binary_remote_addr zone=skysaver:10m rate=30r/m;
#
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;    # catch-all — replace with your VPS IP or domain if known

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"        always;
    add_header X-Frame-Options         "DENY"           always;
    add_header X-XSS-Protection        "1; mode=block"  always;

    # ── Rate limiting — 30 req/min per IP, burst of 10 without delay ──────────
    # Zone defined in nginx.conf http block (see prerequisite above).
    limit_req zone=skysaver burst=10 nodelay;
    limit_req_status 429;

    # ── Health check — no proxy buffering, suppressed from access log ─────────
    location = /health {
        proxy_pass         http://127.0.0.1:8000/health;
        proxy_set_header   Host $host;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;
        access_log         off;    # suppress health poll noise from logs
    }

    # ── Pipeline run endpoint — EXTENDED timeout (scraping takes minutes) ─────
    # proxy_read_timeout=700s > gunicorn timeout=600s — nginx never cuts first.
    location = /api/v1/scrape/run {
        proxy_pass          http://127.0.0.1:8000/api/v1/scrape/run;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    Connection        "";
        proxy_read_timeout  700s;
        proxy_send_timeout  700s;
        # Disable buffering for long-running requests so client gets response immediately
        proxy_buffering     off;
    }

    # ── All other API endpoints — standard timeout ────────────────────────────
    location /api/ {
        proxy_pass          http://127.0.0.1:8000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    Connection        "";
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        # Response buffering — safe for small JSON responses
        proxy_buffering     on;
        proxy_buffer_size   4k;
        proxy_buffers       8 4k;
    }

    # ── Block everything else — return 404 ───────────────────────────────────
    location / {
        return 404;
    }
}
